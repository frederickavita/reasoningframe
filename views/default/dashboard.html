<!DOCTYPE html>
<html lang="en">
<head>
    <title>reasoningframe - My Learning Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,800&display=swap">
    
    <!-- Brython -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.0/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.0/brython_stdlib.js"></script>

    <style>
        html, body { font-family: 'Inter', sans-serif; background: #0b0b0f; color: #e5e7eb; margin: 0; }
        .rf-shell { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .rf-nav { border-bottom: 1px solid rgba(255,255,255,0.08); padding: 20px 0; margin-bottom: 40px; }
        .rf-brand { font-weight: 800; font-size: 22px; letter-spacing: -1.5px; cursor: pointer; }
        .rf-muted { color: #a1a1aa; }
        .rf-glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
        
        /* Dropdown Menu */
        .rf-dropdown { position: relative; display: inline-block; cursor: pointer; }
        .rf-dropdown-content {
            display: none; position: absolute; right: 0; background-color: #16161e;
            min-width: 150px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 100; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            overflow: hidden; margin-top: 10px;
        }
        .rf-dropdown-content a { color: #e5e7eb; padding: 12px 16px; text-decoration: none; display: block; font-size: 14px; text-align: left;}
        .rf-dropdown-content a:hover { background-color: rgba(99,102,241,0.1); color: #818cf8; }
        .rf-dropdown:hover .rf-dropdown-content { display: block; }

        /* Modal Settings */
        .rf-modal { 
            display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); overflow-y: auto; padding: 50px 0;
        }
        .modal-body { 
            background: #111118; max-width: 450px; margin: 0 auto; padding: 32px; 
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); text-align: center;
        }

        /* UI Components */
        .btn-primary { background: #6366f1; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { background: #4f46e5; }
        .btn-credit { background: rgba(99,102,241,0.1); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); padding: 8px 16px; border-radius: 999px; font-weight: 600; cursor: pointer; font-size: 14px; transition: 0.2s; }
        
        /* Table Style */
        .rf-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .rf-table td { padding: 16px; background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rf-table td:first-child { border-left: 1px solid rgba(255,255,255,0.05); border-top-left-radius: 14px; border-bottom-left-radius: 14px; }
        .rf-table td:last-child { border-right: 1px solid rgba(255,255,255,0.05); border-top-right-radius: 14px; border-bottom-right-radius: 14px; }

        .dashboard-state { display: none; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(99,102,241,0.1); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onload="brython()">

<div class="rf-shell">
    <!-- Navbar -->
    <div class="rf-nav w3-cell-row">
        <div class="w3-cell w3-cell-middle">
            <span class="rf-brand" onclick="window.location.href='{{=URL('default', 'dashboard')}}'">
                reasoning<span style="color:#818cf8;">frame</span>
            </span>
        </div>
        <div class="w3-cell w3-cell-middle" style="text-align: right;">
            <button class="btn-credit w3-margin-right" id="open_topup">
                ⚡ {{=auth.user.credits if auth.user else 0}} Credits
            </button>
            
            <div class="rf-dropdown">
                <img src="https://ui-avatars.com/api/?name={{=auth.user.first_name if auth.user else 'User'}}&background=6366f1&color=fff" style="width: 38px; border-radius: 50%; vertical-align: middle;">
                <div class="rf-dropdown-content">
                    <a href="{{=URL('default', 'profile')}}">⚙️ Profile</a>
                    <a href="{{=URL('default', 'logout')}}" style="color: #f87171;">🚪 Logout</a>
                </div>
            </div>
        </div>
    </div>

    <!-- States -->
    <div id="state-loading" class="dashboard-state w3-center w3-padding-64">
        <div class="spinner w3-margin-bottom"></div>
        <h3 style="font-weight: 700;">Fetching your journey...</h3>
    </div>

    <div id="state-empty" class="dashboard-state w3-center w3-padding-64">
        <div class="rf-glass w3-padding-48" style="max-width: 600px; margin: 0 auto;">
            <div style="font-size: 48px; margin-bottom: 20px;">📚</div>
            <h2 style="font-weight: 800;">Your library is empty</h2>
            <button class="btn-primary" onclick="window.location.href='/'">Generate My First Course</button>
        </div>
    </div>

    <div id="state-content" class="dashboard-state">
        <div class="w3-row-padding w3-margin-bottom">
            <div class="w3-col m8">
                <h1 style="font-weight: 800; margin: 0; letter-spacing: -1.5px;">My Courses</h1>
                <p class="rf-muted">Pick up where you left off.</p>
            </div>
            <div class="w3-col m4 w3-right-align">
                <button class="btn-primary" onclick="window.location.href='/'">+ New Course</button>
            </div>
        </div>
        <table class="rf-table">
            <tbody id="course_table_body"></tbody>
        </table>
    </div>
</div>

<!-- Modal Topup -->
<div id="modal_topup" class="rf-modal">
    <div class="modal-body">
        <h2 style="font-weight: 800; margin-top: 0;">Top up Credits</h2>
        <p class="rf-muted">One credit = One AI-generated course.</p>
        
        <div class="rf-glass w3-padding-24 w3-margin-top w3-margin-bottom" style="border-color: rgba(99,102,241,0.3); background: rgba(99,102,241,0.05);">
            <span style="font-size: 32px; font-weight: 800;">100 Credits</span><br>
            <span style="color: #818cf8; font-size: 20px; font-weight: 700;">$39.00</span>
        </div>
        
        <!-- LE LIEN QUI APPELLE TON SERVEUR AVANT PAYPAL -->
        <a href="{{=URL('default', 'initiate_topup')}}" 
           class="btn-primary" 
           style="display: block; width: 100%; text-decoration: none; padding: 14px; font-size: 16px;">
           Pay with PayPal
        </a>
        <p class="w3-small rf-muted w3-margin-top">You will be securely redirected to PayPal.</p>
        
        <button class="w3-button w3-margin-top rf-muted" id="close_topup" style="background: transparent; width: 100%;">Cancel</button>
    </div>
</div>

<script>
    function toggleModal() {
        const modal = document.getElementById('modal_topup');
        modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
    }
    document.getElementById('open_topup').addEventListener('click', toggleModal);
    document.getElementById('close_topup').addEventListener('click', toggleModal);
</script>

<script type="text/python">
from browser import document, ajax, html
import json

class DashboardManager:
    def __init__(self):
        self.api_url = "{{=URL('default', 'get_courses')}}"

    def fetch_data(self):
        document["state-loading"].style.display = "block"
        ajax.get(self.api_url, oncomplete=self.on_complete)

    def on_complete(self, req):
        document["state-loading"].style.display = "none"
        if req.status == 200:
            data = json.loads(req.text)
            if not data:
                document["state-empty"].style.display = "block"
            else:
                document["state-content"].style.display = "block"
                self._fill_table(data)
        else:
            document["state-empty"].style.display = "block"

    def _fill_table(self, data):
        container = document["course_table_body"]
        container.clear() # On vide proprement au lieu de remplacer du HTML brut

        for item in data:
            # Construction sécurisée du DOM avec Brython
            tr = html.TR()

            td1 = html.TD()
            td1 <= html.DIV(item.get("title", "Untitled"), style={"font-weight": "600"})
            td1 <= html.SPAN(item.get("language", "Coding"), Class="rf-muted", style={"font-size": "12px"})

            td2 = html.TD(item.get("date", "N/A"), Class="rf-muted")

            td3 = html.TD(style={"text-align": "right"})
            review_btn = html.BUTTON("Review", Class="btn-primary", style={"padding": "6px 16px", "font-size": "13px"})
            td3 <= review_btn

            tr <= td1
            tr <= td2
            tr <= td3
            container <= tr

manager = DashboardManager()
manager.fetch_data()
</script>

</body>
</html>
