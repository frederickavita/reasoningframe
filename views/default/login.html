<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Reasoning Frame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neonBlue: '#00f3ff',
                        darkBg: '#0f172a',
                        cardBg: '#1e293b'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-white h-screen flex items-center justify-center overflow-hidden relative">

    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-neonBlue/10 rounded-full blur-[120px] animate-float"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-purple-600/10 rounded-full blur-[120px] animate-float" style="animation-delay: 2s;"></div>
    </div>

    <div class="relative z-10 w-full max-w-md p-8 bg-gray-900/50 backdrop-blur-xl border border-gray-700/50 rounded-2xl shadow-[0_0_50px_rgba(0,0,0,0.5)] animate-fade-in text-center">
        
        <div class="mb-8 inline-block">
            <div class="h-16 w-16 mx-auto bg-gradient-to-tr from-neonBlue to-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(0,243,255,0.3)] mb-4">
                <span class="text-3xl">🧠</span>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wide">Reasoning Frame</h1>
            <p class="text-gray-400 text-sm mt-1">From Chaos to Code.</p>
        </div>

        <div class="space-y-4">
            <a href="{{=google_url}}" 
               class="flex items-center justify-center gap-3 w-full bg-white text-gray-900 hover:bg-gray-100 font-bold py-3 px-4 rounded-lg transition-all transform hover:scale-[1.02] shadow-lg group">
                
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span>Continue with Google</span>
            </a>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-gray-700"></div>
                <span class="flex-shrink-0 mx-4 text-gray-500 text-xs">Secure & Instant Access</span>
                <div class="flex-grow border-t border-gray-700"></div>
            </div>

            <p class="text-xs text-gray-500">
                By continuing, you agree to our <a href="#" class="text-neonBlue hover:underline">Terms of Service</a>.
            </p>
        </div>
    </div>

    <div class="absolute bottom-4 text-gray-600 text-xs">
        &copy; 2026 Reasoning Frame Inc.
    </div>

</body>
</html>
