<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ReasoningFrame</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0a0a0a;
            --text-main: #e5e5e5;
            --accent-blue: #3b82f6; 
            --accent-green: #00ff41;
            --border-color: #333;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: var(--font-sans); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            position: relative;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 10s infinite ease-in-out;
            z-index: 0;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--accent-blue); top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: var(--accent-green); bottom: -50px; right: -50px; animation-delay: 2s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 40px); }
        }

        .login-card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            padding: 50px 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-box {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(0,255,65,0.05));
            border: 1px solid #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.8rem;
            color: var(--accent-blue);
        }

        h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 5px; }
        p { color: #888; font-size: 0.9rem; margin: 0 0 30px; }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            background: white;
            color: #111;
            font-weight: 600;
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 1rem;
        }
        .btn-google:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .divider {
            margin: 30px 0;
            display: flex;
            align-items: center;
            color: #444;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #333;
        }
        .divider span { margin: 0 15px; }

    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-card">
        
        <div class="logo-box">
            <i class="fa fa-shield-halved"></i>
        </div>
        
        <h1>ReasoningFrame</h1>
        <p>Secure your advertising budgets.</p>

        <a href="{{=google_url}}" class="btn-google">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
        </a>

        <div class="divider">
            <span>Secure Access</span>
        </div>

        <p style="font-size: 0.75rem; color: #555; margin-bottom: 0;">
            By continuing, you agree to our Terms of Service.<br>
            Data is end-to-end encrypted.
        </p>

    </div>

    <div style="position: absolute; bottom: 20px; color: #444; font-size: 0.7rem; font-family: var(--font-mono);">
        REASONINGFRAME © 2026
    </div>

</body>
</html>
