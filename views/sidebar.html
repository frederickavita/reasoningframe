        </a>

    <nav class="sidebar-nav">
        <a href="{{=URL('default', 'new')}}" class="nav-item {{='active' if request.function == 'new' else ''}}">

        </a>

        <a href="{{=URL('default', 'history')}}" class="nav-item {{='active' if request.function == 'history' else ''}}">
